name: Criar APK da Karen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Baixando o repositório
      uses: actions/checkout@v4

    - name: Configurando o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalando dependências do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk libsqlite3-dev lld cmake pkg-config libffi-dev autoconf automake libtool
        pip install --upgrade pip
        pip install "cython<3.0.0" wheel setuptools buildozer

    - name: Aceitando licenças do Android nativo
      run: |
        # Aceita os termos usando o sdkmanager nativo que já existe na máquina do GitHub
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Compilando o APK com caminhos globais
      run: |
        # Executa o buildozer apontando para o SDK estável que vimos no seu log
        buildozer android debug
      env:
        BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
