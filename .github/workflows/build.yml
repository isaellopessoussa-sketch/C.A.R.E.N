name: Criar APK da Karen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Baixando o repositório
      uses: actions/checkout@v4

    - name: Configurando o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalando todas as dependências do Android e Kivy
      run: |
        # Corrige problemas de mirrors do apt que causam o erro 100
        sudo rm -rf /var/lib/apt/lists/*
        sudo apt-get clean
        
        # Atualiza o sistema ignorando repositórios quebrados
        sudo apt-get update --allow-releaseinfo-change || true
        
        # Instala apenas as ferramentas essenciais e modernas do SDK
        sudo apt-get install -y git zip unzip openjdk-17-jdk \
        libsqlite3-dev lld cmake pkg-config libffi-dev autoconf automake libtool
        
        # Atualiza o pip e ferramentas de empacotamento
        pip install --upgrade pip
        pip install buildozer setuptools cython

    - name: Compilando o APK com Buildozer
      run: |
        # Cria a pasta de licenças e aceita os termos do SDK do Android
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n89645534d78d0b54dcc1696dd4213cd44c34af3a\n2842d31bdaab1715cde24767544b66c50d6f6040\nd56f5187479451eabf01fb74bf36db4169f4b37d\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        
        # Limpa restos de builds anteriores que possam ter quebrado
        buildozer android clean
        
        # Executa o build forçando o "sim" para qualquer pergunta do terminal
        yes | buildozer android debug
      env:
        BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1

    - name: Subir o arquivo APK pronto
      uses: actions/upload-artifact@v4
      with:
        name: Karen-AI-APK
        path: bin/*.apk
