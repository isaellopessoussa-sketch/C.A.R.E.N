name: Criar APK da Karen v3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixando o repositório
      uses: actions/checkout@v4

    - name: Configurando o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Configurando o Java (Android Requirement)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Instalando o Cordova Globalmente
      run: npm install -g cordova

    - name: Criando Projeto Android Nativo
      run: |
        # Inicializa a estrutura de aplicativo
        cordova create cordova_project com.starkindustries.karen KarenAI
        cd cordova_project
        cordova platform add android

    - name: Copiando Arquivos e Config
      run: |
        # Substitui o index e config originais pelos do seu repositório
        cp ../index.html ./cordova_project/www/
        cp ../config.xml ./cordova_project/

    - name: Adicionando Plugins Nativos (Vibração)
      run: |
        cd cordova_project
        cordova plugin add cordova-plugin-vibration
        cordova plugin add cordova-plugin-battery-status

    - name: Compilando o APK (Debug Mode)
      run: |
        cd cordova_project
        # Aceita os termos do SDK e compila o APK padrão
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        cordova build android --device

    - name: Subir o APK Pronto
      uses: actions/upload-artifact@v4
      with:
        name: Karen-AI-APK
        path: cordova_project/platforms/android/app/build/outputs/apk/debug/*.apk
