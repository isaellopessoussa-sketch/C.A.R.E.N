name: Criar APK da Karen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixando o repositório
      uses: actions/checkout@v4

    - name: Configurando o Python Estável
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalando dependências de sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk libsqlite3-dev lld cmake pkg-config libffi-dev autoconf automake libtool
        pip install --upgrade pip
        pip install setuptools cython==0.29.36 buildozer

    - name: Compilando o APK com Buildozer
      run: |
        # Aceita os termos de uso do Android SDK automaticamente
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n89645534d78d0b54dcc1696dd4213cd44c34af3a\n2842d31bdaab1715cde24767544b66c50d6f6040\nd56f5187479451eabf01fb74bf36db4169f4b37d\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        
        # Executa o build direto aceitando todas as configurações pendentes
        yes | buildozer android debug
      env:
        BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1

    - name: Subir o arquivo APK pronto
      uses: actions/upload-artifact@v4
      with:
        name: Karen-AI-APK
        path: bin/*.apk
