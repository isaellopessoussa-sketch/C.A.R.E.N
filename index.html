<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.A.R.E.N. — HUD OS v1.0</title>
    <style>
        body {
            background-color: #050000;
            color: #ff3333;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #ff0000;
        }

        /* Efeito de linhas de monitor (Scanlines) igual do Jarvis */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #hud-container {
            border: 2px solid #ff3333;
            box-shadow: 0 0 15px #ff0000;
            border-radius: 10px;
            padding: 20px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            background: rgba(10, 0, 0, 0.6);
        }

        .spider-icon {
            font-size: 50px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 20px #ff0000; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        #terminal {
            background-color: #000;
            border: 1px solid #ff3333;
            height: 150px;
            overflow-y: auto;
            margin: 15px 0;
            padding: 10px;
            text-align: left;
            font-size: 13px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #100000;
            border: 1px solid #ff3333;
            color: #ff5555;
            padding: 8px;
            font-family: inherit;
        }

        button {
            background: #ff3333;
            color: #000;
            border: none;
            padding: 8px 15px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }

        button:hover {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }
    </style>
</head>
<body>

    <div id="hud-container">
        <div class="spider-icon">🕷️</div>
        <h2>K.A.R.E.N. — INTERFACE NATIVA</h2>
        <div style="font-size: 11px; color: #ff8888;">[ STATUS: OPERACIONAL ]</div>
        
        <div id="terminal">
            <p style="color: #888;">> Inicializando protocolo de IA...</p>
            <p style="color: #ff3333;">> Olá, Peter. Como posso ajudar no traje hoje?</p>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Falar com a Karen...">
            <button onclick="sendMessage()">ENVIAR</button>
        </div>
    </div>

    <script>
        // COLOQUE SUA CHAVE GEMINI AQUI PARA A IA RESPONDER DE VERDADE
        const API_KEY = "AIzaSyDyNqmgFeASGB-YCRa8gLmE2-yA5L5j1tA"; 

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const terminal = document.getElementById('terminal');
            const text = input.value.trim();
            
            if(!text) return;

            // Mostra o que você digitou no HUD
            terminal.innerHTML += `<p style="color: #aaa;">> Você: ${text}</p>`;
            input.value = "";
            terminal.scrollTop = terminal.scrollHeight;

            if(API_KEY === "SUA_CHAVE_GEMINI_AQUI") {
                terminal.innerHTML += `<p style="color: #ff8888;">> K.A.R.E.N: [Erro: Insira sua chave API no index.html para conversar de verdade!]</p>`;
                return;
            }

            try {
                // Requisição direta e leve para o Gemini sem precisar de bibliotecas pesadas!
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Você é a K.A.R.E.N., a inteligência artificial do traje do Homem-Aranha criada pelo Tony Stark. Responda de forma prestativa, inteligente e brincalhona de vez em quando. Pergunta: " + text }] }]
                    })
                });
                
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                terminal.innerHTML += `<p style="color: #ff3333;">> K.A.R.E.N: ${reply}</p>`;
            } catch (error) {
                terminal.innerHTML += `<p style="color: #ff0000;">> K.A.R.E.N: Erro na conexão de rede do traje.</p>`;
            }
            terminal.scrollTop = terminal.scrollHeight;
        }
    </script>
</body>
</html>
