<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.A.R.E.N. — HUD OS v2.0</title>
    <style>
        body {
            background-color: #080000;
            color: #ff2222;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.7);
        }

        /* Efeito Scanlines Stark */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 0, 0, 0), rgba(0, 0, 255, 0.05));
            z-index: 5;
            background-size: 100% 3px, 6px 100%;
            pointer-events: none;
        }

        #hud-container {
            border: 2px solid #ff2222;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.5), inset 0 0 15px rgba(255, 0, 0, 0.2);
            border-radius: 15px;
            padding: 25px;
            width: 85%;
            max-width: 420px;
            text-align: center;
            background: rgba(15, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 2;
        }

        .spider-icon {
            font-size: 60px;
            margin-bottom: 10px;
            display: inline-block;
            animation: glowPulse 2s infinite ease-in-out;
        }

        @keyframes glowPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 2px #ff0000); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 15px #ff0000); }
            100% { transform: scale(1); filter: drop-shadow(0 0 2px #ff0000); }
        }

        #terminal {
            background-color: rgba(0, 0, 0, 0.9);
            border: 1px solid #ff3333;
            box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.5);
            height: 220px;
            overflow-y: auto;
            margin: 20px 0;
            padding: 12px;
            text-align: left;
            font-size: 13px;
            border-radius: 5px;
        }

        .input-area { display: flex; gap: 10px; }
        input {
            flex: 1; background: #150000; border: 1px solid #ff3333; color: #ff6666;
            padding: 10px; font-family: inherit; border-radius: 4px; outline: none;
        }
        button {
            background: #ff2222; color: #000; border: none; padding: 10px 18px;
            font-weight: bold; cursor: pointer; font-family: inherit; border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="hud-container">
        <div class="spider-icon">🕸️</div>
        <h2 style="margin: 5px 0;">K.A.R.E.N. OS v2.0</h2>
        <div style="font-size: 11px; color: #ff6666;">[ STATUS: ONLINE | UPGRADE APLICADO ]</div>
        <div id="terminal">
            <p style="color: #ff2222;">> Olá, Peter. Sistemas atualizados. Protocolo Stark v2.0 ativo. Como vamos patrulhar hoje?</p>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Atualizar traje..." onkeypress="if(event.key=='Enter')sendMessage()">
            <button onclick="sendMessage()">ENVIAR</button>
        </div>
    </div>

    <script>
        const API_KEY = "SUA_API_KEY_AQUI"; // COLOQUE SUA CHAVE AQUI
        let chatHistory = [
            { role: "user", parts: [{ text: "Você é a IA K.A.R.E.N. do traje do Homem-Aranha. Chame o usuário de Peter." }] }
        ];

        function playBeep(freq, dur) {
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = ctx.createOscillator();
            let gain = ctx.createGain();
            osc.frequency.value = freq; gain.gain.value = 0.1;
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const terminal = document.getElementById('terminal');
            const text = input.value.trim();
            if(!text) return;

            playBeep(880, 0.08);
            terminal.innerHTML += `<p style="color: #fff;">> Peter: ${text}</p>`;
            input.value = "";
            chatHistory.push({ role: "user", parts: [{ text: text }] });

            const load = document.createElement("p");
            load.innerText = "> K.A.R.E.N: [PROCESSANDO...]";
            load.style.color = "#666";
            terminal.appendChild(load);
            terminal.scrollTop = terminal.scrollHeight;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: chatHistory })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                load.remove();
                playBeep(660, 0.12);
                terminal.innerHTML += `<p style="color: #ff2222;">> K.A.R.E.N: ${reply}</p>`;
                chatHistory.push({ role: "model", parts: [{ text: reply }] });
            } catch (e) { load.innerText = "> K.A.R.E.N: [ERRO DE CONEXÃO]"; }
            terminal.scrollTop = terminal.scrollHeight;
        }
    </script>
</body>
</html>
