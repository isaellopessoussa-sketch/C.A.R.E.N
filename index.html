<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.A.R.E.N. — HUD OS v3.0</title>
    <script src="cordova.js"></script>
    <style>
        /* Estilos originais tunados com mais glow */
        body {
            background-color: #0d0101; color: #ff2222; font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
            text-shadow: 0 0 10px rgba(255, 34, 34, 0.7);
        }

        /* Scanlines mais visíveis */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 0, 0, 0), rgba(0, 0, 255, 0.04));
            z-index: 5; background-size: 100% 3px, 6px 100%; pointer-events: none;
        }

        #hud-container {
            border: 2px solid #ff2222; box-shadow: 0 0 25px rgba(255, 0, 0, 0.5), inset 0 0 15px rgba(255, 0, 0, 0.3);
            border-radius: 15px; padding: 25px; width: 85%; max-width: 420px;
            text-align: center; background: rgba(15, 0, 0, 0.85); backdrop-filter: blur(5px); z-index: 2;
        }

        .spider-icon {
            font-size: 60px; margin-bottom: 10px; display: inline-block;
            animation: glowPulse 2s infinite ease-in-out;
        }
        
        /* Animação quando a Karen está processando */
        .spider-thinking {
            animation: fastPulse 0.5s infinite linear !important;
        }

        @keyframes glowPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 2px #ff0000); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 15px #ff0000); opacity: 1; }
            100% { transform: scale(1); filter: drop-shadow(0 0 2px #ff0000); }
        }

        @keyframes fastPulse {
            0% { opacity: 0.8; } 50% { opacity: 0.2; } 100% { opacity: 0.8; }
        }

        #terminal {
            background-color: rgba(0, 0, 0, 0.9); border: 1px solid #ff3333;
            box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.5); height: 220px;
            overflow-y: auto; margin: 20px 0; padding: 12px; text-align: left;
            font-size: 13px; border-radius: 5px; scroll-behavior: smooth;
        }

        /* Barra de rolagem customizada Stark */
        #terminal::-webkit-scrollbar { width: 4px; }
        #terminal::-webkit-scrollbar-thumb { background: #ff2222; border-radius: 10px; }

        .input-area { display: flex; gap: 10px; }
        input {
            flex: 1; background: #150000; border: 1px solid #ff3333; color: #ff6666;
            padding: 10px; font-family: inherit; border-radius: 4px; outline: none;
        }
        button {
            background: #ff2222; color: #000; border: none; padding: 10px 18px;
            font-weight: bold; cursor: pointer; font-family: inherit; border-radius: 4px;
            transition: background 0.2s;
        }
        button:hover { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
    </style>
</head>
<body>
    <div id="hud-container">
        <div class="spider-icon" id="mainSpider">🕸️</div>
        <h2 style="margin: 5px 0;">K.A.R.E.N. OS v3.0</h2>
        <div style="font-size: 11px; color: #ff6666;" id="suitStatus">[ STATUS: ONLINE | UPGRADE APLICADO ]</div>
        <div id="terminal">
            <p style="color: #ff2222;">> Olá, Peter. Sistemas atualizados. Protocolo Stark v3.0 tátil ativo. Como vamos patrulhar?</p>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Atualizar traje..." onkeypress="if(event.key=='Enter')sendMessage()">
            <button onclick="sendMessage()">ENVIAR</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyDyNqmgFeASGB-YCRa8gLmE2-yA5L5j1tA"; // COLOQUE SUA CHAVE AQUI
        
        let chatHistory = [
            { role: "user", parts: [{ text: "Você é a IA K.A.R.E.N. do traje do Homem-Aranha. Chame o usuário de Peter. Responda de forma tecnológica, amigável e tática." }] }
        ];

        // Função de vibração nativa (funciona só no app instalado!)
        function vibrate(pattern) {
            try { navigator.vibrate(pattern); } catch(e) { console.log("Vibração não suportada no navegador."); }
        }

        // Função para bipes eletrônicos
        function playBeep(freq, dur) {
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator(); let gain = ctx.createGain();
                osc.frequency.value = freq; gain.gain.value = 0.08;
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + dur);
            } catch(e) {}
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const terminal = document.getElementById('terminal');
            const mainSpider = document.getElementById('mainSpider');
            const text = input.value.trim();
            if(!text) return;

            // Vibração curta de envio e som
            vibrate(50);
            playBeep(880, 0.08);

            terminal.innerHTML += `<p style="color: #ffffff; opacity: 0.8;">> Peter: ${text}</p>`;
            input.value = "";
            chatHistory.push({ role: "user", parts: [{ text: text }] });

            // Elemento de carregamento
            const loadId = "load_" + Date.now();
            terminal.innerHTML += `<p id="${loadId}" style="color: #666; animation:fastPulse 0.8s infinite;">> K.A.R.E.N: [PROCESSANDO...]</p>`;
            
            // Ativa animação de pensar
            mainSpider.classList.add("spider-thinking");
            terminal.scrollTop = terminal.scrollHeight;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: chatHistory })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                document.getElementById(loadId).remove();
                mainSpider.classList.remove("spider-thinking");

                // Vibração tática de resposta e som
                vibrate([80, 50, 80]); // Padrão vibrar-parar-vibrar
                playBeep(660, 0.12);

                terminal.innerHTML += `<p style="color: #ff2222;">> K.A.R.E.N: ${reply}</p>`;
                chatHistory.push({ role: "model", parts: [{ text: reply }] });
            } catch (e) { 
                document.getElementById(loadId).innerText = "> K.A.R.E.N: [ERRO CRÍTICO DE CONEXÃO]"; 
                mainSpider.classList.remove("spider-thinking");
            }
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Tenta pegar a bateria real se o navegador/app permitir
        try {
            navigator.getBattery().then(function(battery) {
                function updateBatteryStatus() {
                    let perc = (battery.level * 100).toFixed(0);
                    document.getElementById("suitStatus").innerText = `[ TRAJE: ONLINE | ENERGIA CÉLULA: ${perc}% ]`;
                }
                updateBatteryStatus();
                battery.addEventListener('levelchange', updateBatteryStatus);
            });
        } catch(e) {}
    </script>
</body>
</html>
